name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  contracts:
    name: Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust and the wasm target
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup target add wasm32v1-none

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      # The factory embeds the campaign's spec via `contractimport!`, so the
      # campaign wasm must exist before the factory compiles. `make` encodes the
      # ordering and falls back to cargo when the Stellar CLI is absent.
      - name: Build contracts
        run: make build

      - name: Test
        run: cargo test --locked

      - name: Upload wasm artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contracts-wasm
          path: target/wasm32v1-none/release/*.wasm

  web:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
